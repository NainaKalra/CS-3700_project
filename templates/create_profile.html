<html>
    <head>
        <link rel="stylesheet" href="{{ url_for('static', filename='style_create_profile.css') }}"/>
        <title>Create Profile</title>

    </head>
    <body>
        <h1 class="header">This is where you create your profile</h1>


        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul style="color: red;">
                    {% for message in messages %}
                        <li>{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('create_profile') }}" class="cool-form">
            <div class="form-group">
                <label for="username" class="form-label">
                    <span class="label-icon">👤</span>
                    Username
                </label>
                <input type="text" name="username" id="username" class="form-input" required placeholder="Enter your username">
                <div class="input-glow"></div>
            </div>
            
            <div class="form-group">
                <label for="role" class="form-label">
                    <span class="label-icon">⚡</span>
                    Role
                </label>
                <select name="role" id="role" class="form-select" required>
                    <option value="">--Select a role--</option>
                    <option value="athlete">🏃 Athlete</option>
                    <option value="coach">📋 Coach</option>
                </select>
                <div class="input-glow"></div>
            </div>
            
            <button type="submit" class="submit-button">
                <span class="button-text">Launch Profile</span>
                <span class="button-icon">🚀</span>
            </button>
        </form>
    </body>
</html>
