<html>
    <head>
        
        <title>Login Page</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
    </head>
    <form action="#" method="POST">
        <div class="login_content">
            <p class="login_name">Enter Username:</p>
        </div>
        <div class="login_content">    
            <p class="login_box"><input type="text" name="username" value="{{username if username}}"/></p>
        </div>
        <div class="login_content">
            <p class="login_submit"><input type="submit" value="submit" /></p>
        </div>
    </form>
    <a href="{{ url_for('create_profile') }}">Create Profile</a>
</html>
